databaseChangeLog:
  - changeSet:
      id: 2
      author: gleb elopov
      changes:
        - createTable:
            tableName: payment_cards
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_payment_cards_user
                    references: users(id)
              - column:
                  name: number
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: holder
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: expiration_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: BOOLEAN
                  defaultValueBoolean: true
              - column:
                  name: created_at
                  type: DATE
                  defaultValueComputed: CURRENT_DATE
              - column:
                  name: updated_at
                  type: DATE
      rollback:
        - dropTable:
            tableName: payment_cards